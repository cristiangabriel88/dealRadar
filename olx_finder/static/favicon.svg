<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- radar sweep: bright green fading to transparent -->
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ad6a0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5ad6a0" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="dish">
      <circle cx="16" cy="16" r="13"/>
    </clipPath>
  </defs>

  <!-- scope background -->
  <rect width="32" height="32" rx="7" fill="#161b22"/>
  <circle cx="16" cy="16" r="13" fill="#1d232c"/>

  <!-- sweep wedge -->
  <g clip-path="url(#dish)">
    <path d="M16 16 L16 1 A15 15 0 0 1 31 16 Z" fill="url(#sweep)"/>
  </g>

  <!-- range rings + crosshairs -->
  <g fill="none" stroke="#5ad6a0" stroke-opacity="0.28" stroke-width="1">
    <circle cx="16" cy="16" r="13"/>
    <circle cx="16" cy="16" r="8.5"/>
    <circle cx="16" cy="16" r="4"/>
    <line x1="3" y1="16" x2="29" y2="16"/>
    <line x1="16" y1="3" x2="16" y2="29"/>
  </g>

  <!-- the detected deal: a bright blip -->
  <circle cx="22" cy="10.5" r="3.2" fill="#5ad6a0" fill-opacity="0.25"/>
  <circle cx="22" cy="10.5" r="1.7" fill="#5ad6a0"/>
</svg>
